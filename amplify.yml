version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20          # Node 20 LTS — required for Next.js 15+
        - npm ci              # clean install from package-lock.json
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
